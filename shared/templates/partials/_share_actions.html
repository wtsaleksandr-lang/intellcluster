<!-- Shared share/copy/social action bar.
     Consumers set: share_url, share_text, show_download_md, show_download_json -->
<style>
.sa-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 16px 18px; margin: 24px 0;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 8px;
  align-items: center;
  backdrop-filter: blur(6px);
}
.sa-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-right: 6px;
}
.sa-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s var(--ease-quart), color 0.2s var(--ease-quart), background 0.2s var(--ease-quart);
  font-family: inherit;
}
.sa-btn:hover { border-color: var(--accent-border); color: var(--text-primary); background: var(--accent-soft); }
.sa-btn.primary { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }
.sa-btn.primary:hover { background: var(--accent-border); color: #fff; }
.sa-btn svg { width: 14px; height: 14px; }
.sa-btn.copied { color: var(--green); border-color: rgba(63,185,80,0.35); }
@media (max-width: 640px) {
  .sa-row { padding: 12px 14px; }
  .sa-label { display: none; }
  .sa-btn { flex: 1; justify-content: center; min-width: 0; padding: 8px 10px; }
}
</style>

<div class="sa-row" id="saRow"
     data-share-url="{{ share_url }}"
     data-share-text="{{ share_text|default('') }}">
  <span class="sa-label">Share</span>

  <button type="button" class="sa-btn primary" id="saCopyBtn" title="Copy link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    <span id="saCopyText">Copy link</span>
  </button>

  <a class="sa-btn" id="saTwitterBtn" target="_blank" rel="noopener" href="#" title="Share on X">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    Post on X
  </a>

  <a class="sa-btn" id="saLinkedInBtn" target="_blank" rel="noopener" href="#" title="Share on LinkedIn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    LinkedIn
  </a>

  {% if pdf_url %}
  <a class="sa-btn" href="{{ pdf_url }}" title="Download as PDF">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    .pdf
  </a>
  {% endif %}

  {% if png_url %}
  <a class="sa-btn" href="{{ png_url }}" title="Download OG card as PNG" download>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    .png
  </a>
  {% endif %}

  {% if show_download_md %}
  <button type="button" class="sa-btn" id="saDownloadMdBtn" title="Download as Markdown">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    .md
  </button>
  {% endif %}

  {% if show_download_json %}
  <button type="button" class="sa-btn" id="saDownloadJsonBtn" title="Download as JSON">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    .json
  </button>
  {% endif %}
</div>

<script>
(function() {
  const row = document.getElementById('saRow');
  if (!row) return;
  const url = row.dataset.shareUrl || window.location.href;
  const text = row.dataset.shareText || document.title;

  const tw = document.getElementById('saTwitterBtn');
  if (tw) tw.href = 'https://x.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);

  const li = document.getElementById('saLinkedInBtn');
  if (li) li.href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url);

  const copyBtn = document.getElementById('saCopyBtn');
  const copyText = document.getElementById('saCopyText');
  if (copyBtn) copyBtn.addEventListener('click', function() {
    (async () => {
      try {
        await navigator.clipboard.writeText(url);
        copyBtn.classList.add('copied');
        copyText.textContent = 'Copied';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyText.textContent = 'Copy link';
        }, 1800);
      } catch (e) {
        // Fallback: select URL in a hidden input
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
        copyText.textContent = 'Copied';
        setTimeout(() => { copyText.textContent = 'Copy link'; }, 1800);
      }
    })();
  });
})();
</script>
