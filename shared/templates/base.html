<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{% block title %}IntellCluster{% endblock %} | IntellCluster</title>
<meta name="description" content="{% block meta_desc %}IntellCluster — multi-model AI intelligence for decisions and deep research. Phronesis compares options. Synthesis researches answers.{% endblock %}">
<meta property="og:title" content="{% block og_title %}IntellCluster — Multi-model AI intelligence{% endblock %}">
<meta property="og:description" content="{% block og_desc %}Phronesis ranks your options. Synthesis runs deep multi-model research. Two tools, one ecosystem.{% endblock %}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta property="og:site_name" content="IntellCluster">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2696;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --border: #30363d;
  --border-subtle: rgba(255,255,255,0.06);

  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #484f58;

  --accent: #ff6a3d;
  --accent-dim: rgba(255,106,61,0.10);
  --accent-border: rgba(255,106,61,0.25);
  --accent-glow: rgba(255,106,61,0.06);

  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.10);
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.08);
  --amber: #d29922;
  --amber-dim: rgba(210,153,34,0.10);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

/* Typography classes */
.t-display { font-family: 'Newsreader', Georgia, serif; }
.t-mono { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Consolas, monospace; }

/* Figure labels — scientific paper style */
.fig-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  display: block;
}
.fig-label span { color: var(--accent); }

/* Panel — navy surface card */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

/* Accent bar — orange left border highlight */
.accent-bar {
  border-left: 3px solid var(--accent);
  padding-left: 16px;
}

/* Badges */
.bdg {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 500;
}
.bdg-accent { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
.bdg-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,0.20); }
.bdg-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,81,73,0.15); }
.bdg-muted { background: rgba(139,148,158,0.08); color: var(--text-muted); border: 1px solid var(--border); }

/* Score bars */
.score-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }

/* Metric cards */
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.metric-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.metric-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.metric-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.2s; }
.metric-value { font-size: 16px; font-weight: 600; }

/* Progress circle */
.prog-circle { width: 64px; height: 64px; position: relative; }
.prog-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.prog-circle .track { fill: none; stroke: var(--border); stroke-width: 2.5; }
.prog-circle .fill { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(0.22,1,0.36,1); }
.prog-circle .fill.done { stroke: var(--green); }
.prog-circle .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text); }

/* Step indicator */
.step-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.step-active { background: var(--accent); animation: stepPulse 1.5s infinite; }
.step-done { background: var(--green); }
@keyframes stepPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Reveal animations */
.rv { opacity: 0; transform: translateY(14px); animation: rvUp 0.6s ease-out forwards; }
.rv1 { animation-delay: 0.1s; } .rv2 { animation-delay: 0.2s; } .rv3 { animation-delay: 0.3s; }
@keyframes rvUp { to { opacity: 1; transform: translateY(0); } }

/* Chip/pill */
.chip {
  display: inline-block;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-muted);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent-border); color: var(--text); background: var(--surface2); }

/* Range slider */
input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; height: 20px; }
input[type=range]::-webkit-slider-track { height: 3px; background: var(--border); border-radius: 2px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); margin-top: -5.5px; border: 2px solid var(--bg); }
input[type=range]::-moz-range-track { height: 3px; background: var(--border); border-radius: 2px; border: none; }
input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }

/* Accordion */
details summary { cursor: pointer; list-style: none; }
details summary::-webkit-details-marker { display: none; }
details[open] .chv { transform: rotate(180deg); }
.chv { transition: transform 0.2s ease; }

/* Focus */
input[type=text]:focus, textarea:focus { outline: none; border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-glow); }

/* Responsive */
@media (max-width: 768px) {
  .grid-3 { grid-template-columns: 1fr !important; }
  .hide-mobile { display: none !important; }
  body { font-size: 13px; }
}
@media (max-width: 480px) {
  .panel { padding: 14px; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>

<!-- Nav -->
<nav style="border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 50; background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);">
  <div style="max-width: 760px; margin: 0 auto; padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; gap: 16px;">
    <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
      <span class="t-display" style="font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.2px;">IntellCluster</span>
    </a>
    <div style="display: flex; align-items: center; gap: 4px; font-size: 12px;">
      <a href="/phronesis" data-tool="phronesis" class="nav-tool" style="text-decoration: none; color: var(--text-muted); padding: 6px 12px; border-radius: 6px; transition: all 0.15s;">Phronesis</a>
      <a href="/synthesis" data-tool="synthesis" class="nav-tool" style="text-decoration: none; color: var(--text-muted); padding: 6px 12px; border-radius: 6px; transition: all 0.15s;">Synthesis</a>
    </div>
  </div>
</nav>

<main style="flex: 1;">{% block content %}{% endblock %}</main>

<!-- Footer -->
<footer style="border-top: 1px solid var(--border-subtle); margin-top: 80px;">
  <div style="max-width: 760px; margin: 0 auto; padding: 24px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; font-size: 11px; color: var(--text-dim); flex-wrap: wrap;">
    <div>
      <span class="t-display" style="font-size: 13px; color: var(--text-muted); font-weight: 600;">IntellCluster</span>
      <span style="margin-left: 8px;">&copy; 2026</span>
    </div>
    <div style="display: flex; gap: 20px;">
      <a href="/phronesis" style="color: var(--text-dim); text-decoration: none;">Phronesis</a>
      <a href="/synthesis" style="color: var(--text-dim); text-decoration: none;">Synthesis</a>
      <a href="/privacy" style="color: var(--text-dim); text-decoration: none;">Privacy</a>
      <a href="/terms" style="color: var(--text-dim); text-decoration: none;">Terms</a>
    </div>
  </div>
</footer>

<style>
.nav-tool:hover { color: var(--text) !important; background: rgba(255,255,255,0.04); }
.nav-tool.active { color: var(--accent) !important; background: var(--accent-dim); }
</style>
<script>
(function() {
  var path = window.location.pathname;
  var tool = path.startsWith('/synthesis') ? 'synthesis' : path.startsWith('/phronesis') ? 'phronesis' : null;
  if (tool) document.querySelectorAll('.nav-tool[data-tool="' + tool + '"]').forEach(function(el) { el.classList.add('active'); });
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
