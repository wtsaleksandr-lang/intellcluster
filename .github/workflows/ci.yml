name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test
        env:
          ADMIN_USERNAME: smoke
          ADMIN_PASSWORD: smoke-test-pw
          ADMIN_SECRET_KEY: smoke-secret-key
        run: python -m tests.smoke

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --exclude=uploads --exclude=history --output-format=github
